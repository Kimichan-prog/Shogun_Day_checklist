<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>業務準備チェックリスト</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    :root{--bg:#0f0f13;--bg2:#16141f;--bg3:#1a1828;--border:#2a2640;--border2:#3d3860;--text1:#f0ece4;--text2:#cdc9c0;--text3:#a098c0;--text4:#6e6890;--green:#7eb8a4;--amber:#e8b86d;--purple:#a98fd4;--safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px);}
    html,body{height:100%;background:var(--bg);color:var(--text1);font-family:'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;-webkit-tap-highlight-color:transparent;}
    #app{display:flex;flex-direction:column;min-height:100dvh;}
    .tab-bar{display:flex;background:#1a1825;border-bottom:1px solid var(--border);padding:calc(var(--safe-top) + 8px) 12px 0;gap:2px;position:sticky;top:0;z-index:200;}
    .tab-btn{flex:1;padding:10px 2px;font-size:11px;font-weight:600;color:var(--text4);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;}
    .tab-btn.active{color:var(--amber);border-bottom-color:var(--amber);}
    .hdr{background:#1a1825;border-bottom:1px solid var(--border);padding:14px 20px;}
    .hdr-title{font-size:20px;font-weight:700;color:var(--text1);}
    .body{flex:1;overflow-y:auto;padding:16px 16px calc(var(--safe-bottom)+32px);max-width:640px;margin:0 auto;width:100%;}
    .card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;margin-bottom:16px;overflow:hidden;}
    .cat-hdr{display:flex;align-items:center;gap:10px;padding:14px 16px 12px;border-bottom:1px solid #1f1d2e;}
    .dot{width:10px;height:10px;border-radius:50%;}
    .cat-name-text{flex:1;font-size:15px;font-weight:600;}
    .item-list{padding:6px 16px 4px;}
    .item-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--bg3);}
    .chk{width:24px;height:24px;border-radius:6px;border:2px solid;background:transparent;display:flex;align-items:center;justify-content:center;cursor:pointer;}
    .item-text{flex:1;font-size:15px;color:var(--text2);}
    .item-text.done{text-decoration:line-through;opacity:0.6;}
    .layout-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px;}
    .layout-card{background:var(--bg2);border:2px solid var(--border);border-radius:12px;overflow:hidden;cursor:pointer;}
    .layout-card.selected{border-color:var(--amber);}
    .layout-card img{width:100%;aspect-ratio:4/3;object-fit:cover;}
    .event-info-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:16px;}
    .event-field-input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px;color:var(--text1);margin-bottom:10px;outline:none;}
    .pdf-download-btn{width:100%;background:linear-gradient(135deg,#2a4a3a,#1e3528);border:1px solid #3a6050;border-radius:10px;padding:14px;color:var(--green);font-weight:700;cursor:pointer;}
    #pdf-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:500;align-items:center;justify-content:center;flex-direction:column;color:#fff;}
    #pdf-overlay.show{display:flex;}
    .pdf-spinner{width:40px;height:40px;border:3px solid #3d3860;border-top-color:var(--amber);border-radius:50%;animation:spin 0.8s linear infinite;margin-bottom:10px;}
    @keyframes spin{to{transform:rotate(360deg);}}
  </style>
</head>
<body>
<div id="app"></div>
<div id="pdf-overlay"><div class="pdf-spinner"></div><p>PDFを生成中...</p></div>

<script>
// データ定義
const DEFAULT_CATEGORIES=[
  {id:"cat-1",name:"事前準備（14日前まで）",color:"#e8b86d",items:[
    {id:"i-1", text:"日程確認", done:false},
    {id:"i-2", text:"参加企業の数確認", done:false},
    {id:"i-3", text:"企業の参加人数確認", done:false},
    {id:"i-4a",text:"弁当発注のお願い（総務）", done:false},
    {id:"i-4b",text:"レイアウト決定", done:false},
    {id:"i-4c",text:"所長に報告", done:false},
  ]},
  {id:"cat-2",name:"会場準備",color:"#e8b86d",items:[
    {id:"i-c2-1",text:"参加企業の数確認", done:false},
    {id:"i-c2-2",text:"会議室のテーブル移動", done:false},
    {id:"i-c2-3",text:"スクリーン設置", done:false},
    {id:"i-c2-4",text:"プロジェクター設置", done:false},
    {id:"i-c2-5",text:"筆記用具設置", done:false},
    {id:"i-c2-6",text:"各種資料設置", done:false},
    {id:"i-c2-7",text:"入口、会場内にゴミがないか確認", done:false},
  ]}
];

const LAYOUTS=[
  {id:"l1",label:"1社レイアウト", url:"https://kimichan-prog.github.io/Shogun_Day_checklist/layout_1sya.png"},
  {id:"l2",label:"2社レイアウト", url:"https://kimichan-prog.github.io/Shogun_Day_checklist/layout_2sya.png"},
  {id:"l3",label:"3社レイアウト", url:"https://kimichan-prog.github.io/Shogun_Day_checklist/layout_3sya.png"},
];

let cats=JSON.parse(JSON.stringify(DEFAULT_CATEGORIES)), tab="check", layoutSel=null, eventInfo={date:"",companies:"",people:""};

function render(){
  const app=document.getElementById("app");
  if(tab==="check") renderCheck(app);
  else if(tab==="layout") renderLayout(app);
}

function renderCheck(app){
  const catsHTML=cats.map(cat=>`
    <div class="card">
      <div class="cat-hdr"><div class="dot" style="background:${cat.color}"></div><span class="cat-name-text">${cat.name}</span></div>
      <div class="item-list">${cat.items.map(item=>`
        <div class="item-row">
          <button class="chk" style="border-color:${item.done?cat.color:'#555'};background:${item.done?cat.color:'transparent'}" onclick="toggleItem('${cat.id}','${item.id}')">${item.done?'✓':''}</button>
          <span class="item-text ${item.done?'done':''}">${item.text}</span>
        </div>`).join("")}
      </div>
    </div>`).join("");
  app.innerHTML=`<div class="tab-bar">
    <button class="tab-btn active" onclick="tab='check';render()">チェックリスト</button>
    <button class="tab-btn" onclick="tab='layout';render()">レイアウト</button>
  </div><div class="body"><div class="hdr"><h1 class="hdr-title">業務準備チェックリスト</h1></div>${catsHTML}</div>`;
}

function renderLayout(app){
  const grid=LAYOUTS.map(l=>`
    <div class="layout-card ${l.id===layoutSel?'selected':''}" onclick="layoutSel='${l.id}';render()">
      <img src="${l.url}"><div style="padding:10px;font-size:12px">${l.label}</div>
    </div>`).join("");
  app.innerHTML=`<div class="tab-bar">
    <button class="tab-btn" onclick="tab='check';render()">チェックリスト</button>
    <button class="tab-btn active" onclick="tab='layout';render()">レイアウト</button>
  </div><div class="body">
    <div class="layout-grid">${grid}</div>
    <div class="event-info-card">
      <input class="event-field-input" placeholder="日付" oninput="eventInfo.date=this.value" value="${eventInfo.date}">
      <input class="event-field-input" placeholder="参加企業名" oninput="eventInfo.companies=this.value" value="${eventInfo.companies}">
      <input class="event-field-input" placeholder="参加人数" oninput="eventInfo.people=this.value" value="${eventInfo.people}">
      <button class="pdf-download-btn" onclick="generatePDF()">⬇ PDFをダウンロード</button>
    </div>
  </div>`;
}

function toggleItem(cid,iid){
  const c=cats.find(x=>x.id===cid);
  const i=c.items.find(x=>x.id===iid);
  i.done=!i.done; render();
}

// PDF生成
async function generatePDF(){
  const overlay=document.getElementById("pdf-overlay");
  overlay.classList.add("show");
  try{
    const {jsPDF}=window.jspdf;
    const doc=new jsPDF({orientation:"portrait",unit:"mm",format:"a4"});
    const M=14, A4W=210;

    // 1ページ目：チェックリスト描画
    const clCanvas=drawChecklistToCanvas(cats);
    const pdfWidth = A4W - M*2;
    const pdfHeight = (pdfWidth * clCanvas.height) / clCanvas.width;
    doc.addImage(clCanvas.toDataURL("image/png"),"PNG",M,M,pdfWidth,pdfHeight);

    // 2ページ目：レイアウト
    if(layoutSel){
      doc.addPage();
      const headerH=22;
      const infoHeader=drawEventInfoHeader(pdfWidth, headerH);
      doc.addImage(infoHeader.toDataURL("image/png"),"PNG",M,M,pdfWidth,headerH);

      const lo=LAYOUTS.find(l=>l.id===layoutSel);
      await new Promise(res=>{
        const img=new Image();
        img.crossOrigin="anonymous";
        img.onload=()=>{
          const aspect=img.naturalHeight/img.naturalWidth;
          const iw=pdfWidth, ih=iw*aspect;
          doc.addImage(img,"PNG",M,M+headerH+10,iw,ih);
          res();
        };
        img.src=lo.url;
      });
    }
    doc.save("checklist.pdf");
  } catch(e) {
    alert("PDF生成に失敗しました");
  } finally {
    overlay.classList.remove("show");
  }
}

// ヘッダー描画（2枚目用）
function drawEventInfoHeader(mmW, mmH){
  const PX=4; 
  const c=document.createElement("canvas");
  c.width=mmW*PX; c.height=mmH*PX;
  const ctx=c.getContext("2d");
  ctx.fillStyle="#f7f5ff"; ctx.fillRect(0,0,c.width,c.height);
  ctx.strokeStyle="#3d3860"; ctx.lineWidth=1*PX; ctx.strokeRect(0,0,c.width,c.height);
  ctx.fillStyle="#1a1a2e"; ctx.font=`bold ${10*PX}px sans-serif`; ctx.textBaseline="middle";
  let txt=`日付:${eventInfo.date}  企業:${eventInfo.companies}  人数:${eventInfo.people}名`;
  ctx.fillText(txt, 15*PX, c.height/2);
  return c;
}

// 1枚目チェックリスト描画（すべての項目を含む）
function drawChecklistToCanvas(targets){
  const PX=4; 
  const CW=182*PX; // PDF有効幅(210-14*2)に合わせる
  const PAD=14*PX, ROW=18*PX, CAT_H=20*PX;
  
  // 高さを動的に計算
  let totalH=PAD*2 + 30*PX;
  targets.forEach(cat=>{
    totalH += CAT_H + 5*PX + (cat.items.length * ROW) + 10*PX;
  });

  const c=document.createElement("canvas");
  c.width=CW; c.height=totalH;
  const ctx=c.getContext("2d");
  ctx.fillStyle="#ffffff"; ctx.fillRect(0,0,CW,totalH);

  let y=PAD;
  ctx.fillStyle="#1a1a2e"; ctx.font=`bold ${16*PX}px sans-serif`;
  ctx.fillText("業務準備チェックリスト", PAD, y+10*PX);
  y += 30*PX;

  targets.forEach(cat=>{
    ctx.fillStyle="#3d3860"; ctx.fillRect(PAD, y, CW-PAD*2, CAT_H);
    ctx.fillStyle="#ffffff"; ctx.font=`bold ${10*PX}px sans-serif`;
    ctx.fillText(cat.name, PAD+8*PX, y+CAT_H/2+4*PX);
    y += CAT_H + 5*PX;

    cat.items.forEach(item=>{
      ctx.strokeStyle="#eeeeee"; ctx.lineWidth=1;
      ctx.beginPath(); ctx.moveTo(PAD, y+ROW); ctx.lineTo(CW-PAD, y+ROW); ctx.stroke();
      
      // チェックボックス
      ctx.strokeStyle="#999"; ctx.strokeRect(PAD, y+ROW/2-6*PX, 12*PX, 12*PX);
      if(item.done){
        ctx.fillStyle=cat.color; ctx.fillRect(PAD, y+ROW/2-6*PX, 12*PX, 12*PX);
        ctx.fillStyle="#fff"; ctx.font=`bold ${10*PX}px sans-serif`;
        ctx.fillText("✓", PAD+2*PX, y+ROW/2+4*PX);
      }
      
      ctx.fillStyle=item.done?"#888":"#1a1a2e";
      ctx.font=`${11*PX}px sans-serif`;
      ctx.fillText(item.text, PAD+18*PX, y+ROW/2+4*PX);
      y += ROW;
    });
    y += 10*PX;
  });
  return c;
}

render();
</script>
</body>
</html>
